[build-system]
requires = ["setuptools", "wheel"]

[project]
name = "clawp"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "fastmcp>=3.1.1",
    "fastapi>=0.135.3",
    "openrouter>=0.7.11",
    "uvicorn[standard]>=0.42.0",
    "whenever>=0.10.0",
]

[project.optional-dependencies]
dev = [
    "yapf>=0.43.0",
]
test = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
]

[tool.pytest]
minversion = "9.0"
addopts = ["-v", "-l"]
asyncio_mode = "auto"
testpaths = ["tests"]
